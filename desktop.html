<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        
        header { 
            background: rgb(6, 94, 3); height: 50px; display: flex; 
            align-items: center; justify-content: center; color: white; 
            z-index: 100; position: relative;
        }

        .btn-sobre {
            position: absolute; right: 20px; background: rgba(255,255,255,0.2);
            color: white; border: 1px solid white; padding: 5px 15px;
            border-radius: 20px; cursor: pointer; font-size: 0.75rem; transition: 0.3s;
        }
        .btn-sobre:hover { background: white; color: rgb(6, 94, 3); }
        
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; background: #fff; }

        .col-lateral-esq { width: 21%; background: #fff; overflow-y: auto; padding: 10px; border-right: 1px solid #ddd; }
        .col-lateral-dir { width: 32%; background: #fff; padding: 15px; overflow-y: auto; border-left: 1px solid #ddd; }
        .col-central { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; overflow: hidden; }

        /* --- BOTÕES LATERAIS (btRes) --- */
        .btRes { 
            width: 100%; padding: 8px 12px; margin-bottom: 6px; background: transparent; 
            border: none; border-left: 5px solid rgb(6, 94, 3); 
            text-align: left; cursor: pointer; font-size: 0.72rem; 
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.1s; color: #333; outline: 2px solid transparent;
        }

        .btRes:hover { background: #f0f0f0; border-left-color: #ff8c00; outline: 2px solid #000; outline-offset: -2px; }

        .btRes.ativo { 
            background: #ff8c00 !important; border-left-color: rgb(6, 94, 3) !important; 
            color: white !important; outline: 2px solid rgb(6, 94, 3) !important; 
            outline-offset: -2px; font-weight: bold;
        }
        .btRes.ativo strong, .btRes.ativo .estoque-status { color: white !important; }
        
        /* --- FICHA TÉCNICA --- */
        .ficha-card { border-left: 5px solid #ff8c00; padding: 12px; border-radius: 4px; background: #fafafa; margin-top: 15px; }
        .ficha-header { font-size: 0.9rem; color: #065e03; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .ficha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .grid-item { font-size: 0.72rem; color: #333; }
        .grid-label { font-weight: bold; color: #666; font-size: 0.65rem; text-transform: uppercase; }

        .secao-titulo { font-size: 0.65rem; font-weight: bold; color: #999; text-transform: uppercase; margin: 15px 0 8px 0; display: block; border-top: 1px solid #eee; padding-top: 10px; }
        
        .linha-link { display: flex; align-items: center; justify-content: space-between; padding: 8px; background: #fff; border: 1px solid #eee; border-radius: 6px; margin-bottom: 6px; position: relative; }
        .link-nome { font-size: 0.72rem; font-weight: bold; color: #444; }
        
        .btn-mini { padding: 6px 10px; border: none; border-radius: 4px; color: white; font-size: 0.62rem; font-weight: bold; cursor: pointer; }
        .btn-abrir { background: #065e03; }
        .btn-copiar { background: #ff8c00; }

        /* --- PREVIEW FLUTUANTE (A MÁGICA) --- */
        #preview-box {
            position: fixed; width: 300px; height: 200px; background: white;
            border: 3px solid rgb(6, 94, 3); border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none; z-index: 2000; pointer-events: none; overflow: hidden;
        }
        #preview-box iframe { width: 100%; height: 100%; border: none; transform: scale(1); }

        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 10px; position: fixed; z-index: 3000; left: 50%; top: 30px; transform: translateX(-50%); font-size: 0.8rem; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body>

    <header>
        <h1>Residenciais MRV em São Paulo</h1>
        <button class="btn-sobre">Sobre</button>
    </header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais">Carregando...</aside>
        
        <main class="col-central">
            <div id="display-nome" style="text-align:center; padding:10px; font-weight:bold;">Selecione uma região</div>
            <div class="container-mapas" id="container-mapas" style="flex:1;">
                <div id="caixa-a" style="height:100%;"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 50px;">Passe o mouse nos botões de "Abrir" para ver o preview.</div>
        </aside>
    </div>

    <div id="preview-box">
        <div style="background:#eee; font-size:10px; padding:2px; text-align:center;">Carregando visualização...</div>
        <iframe id="preview-frame"></iframe>
    </div>

    <div id="toast">Copiado!</div>

    <script src="mrv-data.js"></script>
    <script>
        let DADOS_PLANILHA = [];
        let botaoSelecionado = null;

        // Corrige datas e links do Drive
        function formatarDataSheets(valor) {
            if (!valor || isNaN(valor)) return valor || "Sob consulta";
            const data = new Date((parseFloat(valor) - 25569) * 86400 * 1000);
            const meses = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];
            return `${meses[data.getUTCMonth()]}/${data.getUTCFullYear().toString().slice(-2)}`;
        }

        function limparLinkDrive(url) {
            if (!url || !url.includes('drive.google.com')) return url;
            const match = url.match(/\/d\/(.+?)\/|\/d\/(.+?)$|id=(.+?)(&|$)/);
            const id = match ? (match[1] || match[2] || match[3]) : null;
            return id ? `https://drive.google.com/file/d/${id}/preview` : url;
        }

        // --- FUNÇÕES DO PREVIEW ---
        function mostrarPreview(url, event) {
            const box = document.getElementById('preview-box');
            const frame = document.getElementById('preview-frame');
            const linkPreview = limparLinkDrive(url);

            if (linkPreview && linkPreview.includes('http')) {
                frame.src = linkPreview;
                box.style.display = 'block';
                moverPreview(event);
            }
        }

        function moverPreview(e) {
            const box = document.getElementById('preview-box');
            // Posiciona a caixa um pouco à esquerda e acima do mouse
            box.style.left = (e.clientX - 320) + 'px';
            box.style.top = (e.clientY - 100) + 'px';
        }

        function esconderPreview() {
            const box = document.getElementById('preview-box');
            const frame = document.getElementById('preview-frame');
            box.style.display = 'none';
            frame.src = ''; // Limpa para não pesar
        }

        async function carregarPlanilha() {
            try {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv&v=" + new Date().getTime();
                const response = await fetch(url);
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
                
                DADOS_PLANILHA = linhas.slice(1).map(linha => {
                    const col = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                    return {
                        id_path: col[0]?.toLowerCase(),
                        nome: col[2],
                        estoque: col[3],
                        endereco: `${col[4]}, ${col[5]}`,
                        entrega: formatarDataSheets(col[7]),
                        preco: col[8],
                        book: col[19],
                        mapa: col[28]
                    };
                }).filter(i => i.nome);

                gerarListaGeral();
            } catch (e) { console.error(e); }
        }

        function renderLinkRow(label, link, ico) {
            if (!link || link.length < 10) return "";
            return `<div class="linha-link">
                <div class="link-nome">${ico} ${label}</div>
                <div>
                    <button class="btn-mini btn-abrir" 
                        onmouseenter="mostrarPreview('${link}', event)" 
                        onmousemove="moverPreview(event)"
                        onmouseleave="esconderPreview()"
                        onclick="window.open('${link}', '_blank')">Abrir</button>
                    <button class="btn-mini btn-copiar" onclick="copiarLink('${link}')">Copiar</button>
                </div>
            </div>`;
        }

        function exibirPainelDireito(item) {
            const painel = document.getElementById('detalhes-residencial');
            painel.innerHTML = `
                <div class="ficha-card">
                    <div class="ficha-header">${item.nome}</div>
                    <div class="ficha-grid">
                        <div class="grid-item"><div class="grid-label">Entrega:</div>${item.entrega}</div>
                        <div class="grid-item"><div class="grid-label">Preço:</div>${item.preco}</div>
                    </div>
                    <span class="secao-titulo">Arquivos</span>
                    ${renderLinkRow("Book Cliente", item.book, "📄")}
                    ${renderLinkRow("Localização", item.mapa, "🗺️")}
                </div>`;
        }

        function gerarListaGeral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                btn.innerHTML = `<strong>${item.nome}</strong>`;
                btn.onclick = () => {
                    if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
                    btn.classList.add('ativo');
                    botaoSelecionado = btn;
                    exibirPainelDireito(item);
                };
                menu.appendChild(btn);
            });
        }

        function copiarLink(url) {
            navigator.clipboard.writeText(url);
            const t = document.getElementById("toast");
            t.className = "show"; setTimeout(() => t.className = "", 2000);
        }

        window.onload = carregarPlanilha;
    </script>
</body>
</html>
